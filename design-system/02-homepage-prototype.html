<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>MŌVE — Client Home</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet" />

  <style>
    :root {
      --font: 'Outfit', sans-serif;

      /* Orion palette */
      --black:  #000000;
      --white:  #FFFFFF;
      --sage:   #899089;
      --lime:   #C0FC01;

      /* BG: warm sage-green, darker than cards */
      --bg: #9CA393;

      /* Card: warm creamy sage glass, clearly lighter than bg */
      --card: rgba(196, 201, 188, 0.72);
      --card-blur: 48px;
      --card-glow: inset 0 1px 0 0 rgba(255,255,255,0.30);

      /* Ink — WHITE text on sage glass, Orion style */
      --ink:       #FFFFFF;
      --ink-soft:  rgba(255,255,255,0.85);
      --ink-muted: rgba(255,255,255,0.55);
      --ink-faint: rgba(255,255,255,0.38);

      --r: 22px;
      --r-pill: 999px;

      --ease: cubic-bezier(0.16, 1, 0.3, 1);
      --t: 300ms;
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html {
      font-size: 16px;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    body {
      font-family: var(--font);
      font-weight: 400;
      color: var(--ink);
      background: #1C1C1A;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    /* ── Phone ── */
    .phone {
      width: 393px;
      height: 852px;
      background: var(--bg);
      border-radius: 52px;
      box-shadow:
        0 0 0 1px rgba(0,0,0,0.06),
        0 40px 100px rgba(0,0,0,0.35);
      overflow: hidden;
      position: relative;
    }

    .phone::before {
      content: '';
      position: absolute;
      top: 11px; left: 50%;
      transform: translateX(-50%);
      width: 126px; height: 37px;
      background: var(--black);
      border-radius: 20px;
      z-index: 100;
    }

    .scroll {
      width: 100%; height: 100%;
      overflow-y: auto;
      padding: 66px 18px 100px;
      -webkit-overflow-scrolling: touch;
    }

    .scroll::-webkit-scrollbar { display: none; }

    /* ── Nav ── */
    .nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 28px;
      opacity: 0; transform: translateY(10px);
      animation: up var(--t) var(--ease) 80ms forwards;
    }

    .logo {
      font-size: 16px;
      font-weight: 400;
      letter-spacing: 0.2em;
      text-transform: uppercase;
    }

    .logo-dot {
      display: inline-block;
      width: 4px; height: 4px;
      background: var(--lime);
      border-radius: 50%;
      vertical-align: super;
      margin: 0 0.5px;
    }

    .nav-r { display: flex; gap: 6px; }

    .av {
      width: 36px; height: 36px;
      border-radius: 50%;
      background: linear-gradient(145deg, #8A8F80, #757A6C);
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 500; color: var(--white);
    }

    .hamburger {
      width: 36px; height: 36px;
      border-radius: 50%;
      background: rgba(255,255,255,0.12);
      border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }

    .hamburger svg {
      width: 15px; height: 15px;
      stroke: var(--white); stroke-width: 2; fill: none;
    }

    /* ── Card base ── */
    .card {
      background: var(--card);
      backdrop-filter: blur(var(--card-blur));
      -webkit-backdrop-filter: blur(var(--card-blur));
      border: none;
      box-shadow: var(--card-glow), 0 2px 10px rgba(0,0,0,0.06);
      border-radius: var(--r);
      padding: 24px;
      margin-bottom: 12px;
      position: relative;
      cursor: pointer;
      transition: transform 120ms var(--ease);
    }

    .card:active { transform: scale(0.985); }

    /* Arrow — Orion exact */
    .arr {
      position: absolute;
      top: 22px; right: 22px;
      width: 32px; height: 32px;
      border-radius: 50%;
      background: rgba(255,255,255,0.12);
      display: flex; align-items: center; justify-content: center;
    }

    .arr svg {
      width: 12px; height: 12px;
      stroke: rgba(255,255,255,0.5); stroke-width: 2; fill: none;
    }

    /* ── Card title ── */
    .ct {
      font-size: 17px;
      font-weight: 400;
      color: var(--ink);
      margin-bottom: 10px;
    }

    /* ═══════════════════════════════════════
       CARD 1 — Vandaag
       ═══════════════════════════════════════ */
    .c1 {
      opacity: 0; transform: translateY(14px);
      animation: up var(--t) var(--ease) 160ms forwards;
    }

    .c1-name {
      font-size: 46px;
      font-weight: 250;
      letter-spacing: -0.03em;
      line-height: 1.08;
      margin-bottom: 6px;
    }

    .c1-meta {
      font-size: 13px;
      font-weight: 400;
      color: var(--ink-muted);
      margin-bottom: 22px;
    }

    /* Slider — WHITE fill like Orion */
    .slider-wrap {
      margin-bottom: 6px;
    }

    .slider {
      display: flex;
      align-items: center;
      height: 8px;
    }

    .slider-fill {
      height: 8px;
      background: var(--white);
      border-radius: 4px 0 0 4px;
      width: 72px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }

    .slider-dot {
      width: 18px; height: 18px;
      border-radius: 50%;
      background: var(--white);
      box-shadow: 0 1px 8px rgba(0,0,0,0.18);
      margin: 0 -5px;
      z-index: 2;
      flex-shrink: 0;
    }

    .slider-ticks {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 2.5px;
      padding-left: 4px;
    }

    .slider-tick {
      width: 1.5px;
      border-radius: 1px;
      background: rgba(255,255,255,0.18);
    }

    .slider-labels {
      display: flex;
      justify-content: space-between;
      margin-top: 6px;
      font-size: 11px;
      font-weight: 400;
      color: var(--ink-muted);
    }

    /* ═══════════════════════════════════════
       CARD 2 — Week
       ═══════════════════════════════════════ */
    .c2 {
      opacity: 0; transform: translateY(14px);
      animation: up var(--t) var(--ease) 280ms forwards;
    }

    .c2-num {
      font-size: 46px;
      font-weight: 250;
      letter-spacing: -0.03em;
      line-height: 1.05;
    }

    .c2-num sup {
      font-size: 14px;
      font-weight: 400;
      color: var(--ink-muted);
      position: relative;
      top: -18px;
      margin-left: 2px;
    }

    .dots {
      display: flex;
      justify-content: space-between;
      margin-top: 20px;
      gap: 4px;
    }

    .dc {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 7px;
      flex: 1;
    }

    .dl {
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: var(--ink-faint);
    }

    .dl.now { color: var(--ink); font-weight: 600; }

    .dd {
      width: 34px; height: 34px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      transition: all 250ms var(--ease);
    }

    .dd svg {
      width: 14px; height: 14px;
      stroke-width: 2.5; fill: none;
    }

    .dd.done { background: var(--lime); }
    .dd.done svg { stroke: var(--black); }

    .dd.today {
      background: transparent;
      box-shadow: inset 0 0 0 2px rgba(255,255,255,0.6);
      position: relative;
    }

    .dd.today::after {
      content: '';
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--white);
    }

    .dd.today::before {
      content: '';
      position: absolute;
      inset: -3px;
      border-radius: 50%;
      border: 1.5px solid rgba(255,255,255,0.4);
      opacity: 0;
      animation: pulse 2.5s ease-out infinite;
    }

    @keyframes pulse {
      0% { transform: scale(1); opacity: 0.3; }
      100% { transform: scale(1.5); opacity: 0; }
    }

    .dd.rest {
      background: rgba(255,255,255,0.10);
      font-size: 11px; color: var(--ink-faint);
    }

    .dd.empty { background: rgba(255,255,255,0.10); }

    /* ═══════════════════════════════════════
       CARD 3 — Voeding (minimal: score + bars only)
       ═══════════════════════════════════════ */
    .c3 {
      opacity: 0; transform: translateY(14px);
      animation: up var(--t) var(--ease) 400ms forwards;
    }

    .c3-row {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
    }

    .c3-score {
      font-size: 46px;
      font-weight: 250;
      letter-spacing: -0.03em;
      line-height: 1.05;
    }

    .c3-score span {
      font-size: 16px;
      font-weight: 400;
      color: var(--ink-muted);
    }

    .bars {
      display: flex;
      align-items: flex-end;
      gap: 4px;
      height: 44px;
    }

    .bar {
      width: 5px;
      border-radius: 2.5px;
    }

    .bar.f { background: rgba(255,255,255,0.25); }
    .bar.t { background: var(--lime); }
    .bar.e { background: rgba(255,255,255,0.08); }

    /* Meal labels — horizontal, subtle */
    .c3-meals {
      display: flex;
      gap: 12px;
      margin-top: 16px;
      font-size: 12px;
      color: var(--ink-muted);
    }

    .c3-meal { display: flex; align-items: center; gap: 4px; }

    .c3-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
    }

    .c3-dot.on { background: var(--lime); }
    .c3-dot.off { background: rgba(255,255,255,0.18); }

    /* ═══════════════════════════════════════
       Bottom nav
       ═══════════════════════════════════════ */
    .bnav {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 82px;
      padding: 0 32px 22px;
      display: flex;
      align-items: center;
      justify-content: space-around;
      background: linear-gradient(to top, var(--bg) 60%, transparent);
      z-index: 50;
    }

    .bt {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      cursor: pointer;
      opacity: 0.4;
      transition: opacity 120ms;
    }

    .bt:hover { opacity: 0.6; }
    .bt.on { opacity: 1; }

    .bt svg {
      width: 20px; height: 20px;
      stroke: var(--ink); stroke-width: 1.6; fill: none;
    }

    .bt span {
      font-size: 9px; font-weight: 500; color: var(--ink);
      letter-spacing: 0.02em;
    }

    .bt.on::after {
      content: '';
      width: 4px; height: 4px;
      border-radius: 50%;
      background: var(--lime);
    }

    /* ── Anim ── */
    @keyframes up {
      to { opacity: 1; transform: translateY(0); }
    }

    .lbl {
      text-align: center;
      margin-top: 16px;
      font-family: var(--font);
      font-size: 10px;
      font-weight: 400;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.18);
    }
  </style>
</head>
<body>
  <div>
    <div class="phone">
      <div class="scroll">

        <!-- Nav -->
        <div class="nav">
          <div class="logo">M<span class="logo-dot"></span>VE</div>
          <div class="nav-r">
            <div class="av">G</div>
            <button class="hamburger">
              <svg viewBox="0 0 24 24"><line x1="4" y1="8" x2="20" y2="8"/><line x1="4" y1="16" x2="20" y2="16"/></svg>
            </button>
          </div>
        </div>

        <!-- Card 1: Vandaag -->
        <div class="card c1" id="wc">
          <div class="arr" id="wa">
            <svg viewBox="0 0 24 24"><line x1="7" y1="17" x2="17" y2="7"/><polyline points="7 7 17 7 17 17"/></svg>
          </div>
          <div class="ct">Vandaag</div>
          <div class="c1-name">Push & Pull</div>
          <div class="c1-meta">5 oefeningen · ±50 min · Dag 3</div>
          <div class="slider-wrap">
            <div class="slider">
              <div class="slider-fill" id="sf"></div>
              <div class="slider-dot"></div>
              <div class="slider-ticks" id="st"></div>
            </div>
            <div class="slider-labels">
              <span>Voortgang</span>
              <span id="sl">3 / 5</span>
            </div>
          </div>
        </div>

        <!-- Card 2: Week -->
        <div class="card c2">
          <div class="arr">
            <svg viewBox="0 0 24 24"><line x1="7" y1="17" x2="17" y2="7"/><polyline points="7 7 17 7 17 17"/></svg>
          </div>
          <div class="ct">Deze week</div>
          <div class="c2-num">3<sup>/5</sup></div>
          <div class="dots">
            <div class="dc">
              <div class="dl">Ma</div>
              <div class="dd done"><svg viewBox="0 0 24 24"><polyline points="6 12 10 16 18 8"/></svg></div>
            </div>
            <div class="dc">
              <div class="dl">Di</div>
              <div class="dd rest">—</div>
            </div>
            <div class="dc">
              <div class="dl now">Wo</div>
              <div class="dd today" id="td"></div>
            </div>
            <div class="dc">
              <div class="dl">Do</div>
              <div class="dd done"><svg viewBox="0 0 24 24"><polyline points="6 12 10 16 18 8"/></svg></div>
            </div>
            <div class="dc">
              <div class="dl">Vr</div>
              <div class="dd done"><svg viewBox="0 0 24 24"><polyline points="6 12 10 16 18 8"/></svg></div>
            </div>
            <div class="dc">
              <div class="dl">Za</div>
              <div class="dd empty"></div>
            </div>
            <div class="dc">
              <div class="dl">Zo</div>
              <div class="dd empty"></div>
            </div>
          </div>
        </div>

        <!-- Card 3: Voeding -->
        <div class="card c3">
          <div class="arr">
            <svg viewBox="0 0 24 24"><line x1="7" y1="17" x2="17" y2="7"/><polyline points="7 7 17 7 17 17"/></svg>
          </div>
          <div class="ct">Voeding</div>
          <div class="c3-row">
            <div class="c3-score">87<span>%</span></div>
            <div class="bars">
              <div class="bar f" style="height:18px"></div>
              <div class="bar f" style="height:32px"></div>
              <div class="bar f" style="height:26px"></div>
              <div class="bar f" style="height:36px"></div>
              <div class="bar f" style="height:20px"></div>
              <div class="bar t" style="height:38px"></div>
              <div class="bar e" style="height:8px"></div>
            </div>
          </div>
          <div class="c3-meals">
            <div class="c3-meal"><div class="c3-dot on"></div> Ontbijt</div>
            <div class="c3-meal"><div class="c3-dot on"></div> Lunch</div>
            <div class="c3-meal"><div class="c3-dot off"></div> Snack</div>
            <div class="c3-meal"><div class="c3-dot off"></div> Diner</div>
          </div>
        </div>

      </div>

      <!-- Bottom nav -->
      <div class="bnav">
        <div class="bt on">
          <svg viewBox="0 0 24 24"><path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-4 0a1 1 0 01-1-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 01-1 1h-2z"/></svg>
          <span>Home</span>
        </div>
        <div class="bt">
          <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
          <span>Plan</span>
        </div>
        <div class="bt">
          <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
          <span>Chat</span>
        </div>
        <div class="bt">
          <svg viewBox="0 0 24 24"><circle cx="12" cy="7" r="4"/><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/></svg>
          <span>Profiel</span>
        </div>
      </div>
    </div>

    <div class="lbl">MŌVE — Client Home v3</div>
  </div>

  <script>
    // Slider ticks
    (function() {
      const el = document.getElementById('st');
      if (!el) return;
      for (let i = 0; i < 30; i++) {
        const t = document.createElement('div');
        t.className = 'slider-tick';
        t.style.height = (4 + Math.random() * 7) + 'px';
        el.appendChild(t);
      }
    })();

    // Toggle workout done
    let done = false;
    document.getElementById('wa').addEventListener('click', e => {
      e.stopPropagation();
      done = !done;
      const sf = document.getElementById('sf');
      const td = document.getElementById('td');
      const sl = document.getElementById('sl');
      if (done) {
        sf.style.width = '100%';
        td.className = 'dd done';
        td.innerHTML = '<svg viewBox="0 0 24 24" style="width:14px;height:14px;stroke:black;stroke-width:2.5;fill:none"><polyline points="6 12 10 16 18 8"/></svg>';
        document.querySelector('.c2-num').innerHTML = '4<sup>/5</sup>';
        sl.textContent = '5 / 5';
      } else {
        sf.style.width = '72px';
        td.className = 'dd today';
        td.innerHTML = '';
        document.querySelector('.c2-num').innerHTML = '3<sup>/5</sup>';
        sl.textContent = '3 / 5';
      }
    });
  </script>
</body>
</html>
